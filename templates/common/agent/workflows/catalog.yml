    name: "PARA Master Controller"
    version: "1.0.0"
    kernel_min: "1.4.0"
    kernel_max: "1.x"
    entrypoint: "para.md"
    description: "Master controller for workspace management."
    tags: ["master", "governance"]

  - id: inbox
