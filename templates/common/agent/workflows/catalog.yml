    kernel_max: "1.x"
    entrypoint: "para-audit.md"
    description: "Scan structural drift against Kernel Specs (I1-I11)."
    tags: ["audit", "governance", "invariants"]

  - id: docs
    name: "Documentation Manager"
    version: "1.0.0"
