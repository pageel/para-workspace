# .project.yml — Project Manifest
# Generated by: para scaffold project <name>
# Managed by: para status, para archive

name: "{{project-name}}"
status: active # active | inactive | archived
kernel_version: "1.6.0" # Kernel version at time of creation
created_at: "{{YYYY-MM-DD}}"
owner: "@{{user}}"
profile: "{{profile}}" # dev | general | marketer | ceo

# Optional fields
deadline: null # ISO 8601 date or null
description: ""
tags: []

# Ecosystem fields (v1.6.0+)
# type: standard          # standard | ecosystem (default: standard)
# ecosystem: null         # Parent ecosystem name (for satellite projects)
# satellites: []          # Satellite slugs (for ecosystem projects only)

# Plan tracking
# active_plan: ""         # Relative path or @ecosystem/plans/xxx.md

# Milestones — Strategic roadmap for the project (optional)
# Use feature-first naming. Only add shipped_in after release.
# milestones:
#   - name: "Core MVP"
#     status: done          # done | in-progress | planned
#     shipped_in: "1.0.0"   # Version where this shipped (only for done)
#   - name: "Public Launch"
#     status: in-progress
#   - name: "Advanced Features"
#     status: planned
milestones: []
