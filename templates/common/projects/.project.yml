# .project.yml — Project Manifest
# Generated by: para scaffold project <name>
# Managed by: para status, para archive

name: "{{project-name}}"
status: active # active | inactive | archived
kernel_version: "1.4.1" # Kernel version at time of creation
created_at: "{{YYYY-MM-DD}}"
owner: "@{{user}}"
profile: "{{profile}}" # dev | general | marketer | ceo

# Optional fields
deadline: null # ISO 8601 date or null
description: ""
tags: []

# Milestones — Strategic roadmap for the project (optional)
# Use feature-first naming. Only add shipped_in after release.
# milestones:
#   - name: "Core MVP"
#     status: done          # done | in-progress | planned
#     shipped_in: "1.0.0"   # Version where this shipped (only for done)
#   - name: "Public Launch"
#     status: in-progress
#   - name: "Advanced Features"
#     status: planned
milestones: []
